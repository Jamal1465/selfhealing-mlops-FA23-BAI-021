apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-green-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: green
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: green
    spec:
      containers:
      - image: jamal1465/sentiment-api:stable
        name: sentiment-api
        ports:
        - containerPort: 5000
        volumeMounts:                          # ADD THIS
        - mountPath: /app/logs
          name: logs-storage
      volumes:                                 # ADD THIS
      - name: logs-storage
        persistentVolumeClaim:
          claimName: sentiment-logs-pvc
