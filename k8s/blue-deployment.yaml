apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentiment-blue-deployment          # EXACT — do NOT change
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sentiment-api
      slot: blue
  template:
    metadata:
      labels:
        app: sentiment-api
        slot: blue                          # EXACT slot label
    spec:
      containers:
        - name: sentiment-api
          image: bilalaskari/sentiment-api:unstable   
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: logs-storage
              mountPath: /app/logs          # required for log writing
      volumes:
        - name: logs-storage
          persistentVolumeClaim:
            claimName: sentiment-logs-pvc
